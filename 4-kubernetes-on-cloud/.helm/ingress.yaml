# === 1. Ingress Rule ===
# Định tuyến request từ Internet vào các Service bên trong.
# Hỗ trợ tự động sinh HTTPS thông qua cấu hình tls.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  annotations:
    # Gắn Ingress này với NGINX Controller
    kubernetes.io/ingress.class: "nginx"
    # Kích hoạt cert-manager để tự động gọi ClusterIssuer lấy chứng chỉ Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # (Tùy chọn) Bắt buộc chuyển hướng HTTP -> HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.your-domain.com # Tên miền của bạn (đổi thành tên thật)
    secretName: backend-tls-secret # Tên Secret mà Cert-Manager sẽ tạo ra để lưu SSL Key
  rules:
  - host: api.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service # Trỏ vào Service của ứng dụng Backend
            port:
              number: 3000
