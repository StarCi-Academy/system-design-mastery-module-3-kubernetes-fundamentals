# Cấu hình Helm chart MongoDB Sharded với image từ bitnamilegacy
# (EN: Helm chart configuration for MongoDB Sharded using bitnamilegacy images)
# Chart: oci://registry-1.docker.io/bitnamicharts/mongodb-sharded

# Override tất cả image từ bitnami/* sang bitnamilegacy/*
image:
  registry: docker.io
  repository: bitnamilegacy/mongodb-sharded
  tag: 8.0.13-debian-12-r0
  pullPolicy: IfNotPresent

volumePermissions:
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r51
    pullPolicy: IfNotPresent

metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb-exporter
    tag: 0.47.0-debian-12-r1
    pullPolicy: Always

shards: 2

# Config Server
configsvr:
  replicaCount: 3

# Mongos router
mongos:
  replicaCount: 2

# Shard data nodes
shardsvr:
  dataNode:
    replicaCount: 3
  persistence:
    enabled: true
    size: 8Gi

auth:
  enabled: true
  rootPassword: "root123"
  replicaSetKey: "replicasetkey123"
