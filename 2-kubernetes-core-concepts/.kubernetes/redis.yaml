# === 1. Service cho Redis ===
# Cung cấp tên miền nội bộ `redis-service` cho tầng Cache.
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
# === 2. Deployment cho Redis ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
spec:
  replicas: 1 # Cache thường dùng 1 bản sao hoặc mô hình Cluster riêng biệt
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
